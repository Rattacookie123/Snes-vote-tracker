<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNES Challenge Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{
      background:
        linear-gradient(rgba(0, 0, 0, 0.62), rgba(0, 0, 0, 0.72)),
        url("background.png") center center / cover no-repeat fixed;
      color:white;
      font-family:"Bahnschrift SemiCondensed", "Bahnschrift", "Arial Narrow", Arial, sans-serif;
      font-size:18px;
      text-align:center;
      padding:20px;
      padding-top:88px;
      margin:0;
    }

    h1{
      margin-bottom:25px;
    }

    .topBar{
      position:fixed;
      top:16px;
      right:16px;
      z-index:10;
      display:flex;
      justify-content:flex-end;
    }

    .panel{
      background:rgba(22, 22, 22, 0.88);
      max-width:700px;
      margin:0 auto 20px auto;
      padding:16px;
      border-radius:10px;
      backdrop-filter:blur(4px);
    }

    input{
      padding:10px;
      margin:6px;
      border:none;
      border-radius:6px;
      width:220px;
    }

    button{
      padding:8px 12px;
      margin:4px;
      border:none;
      border-radius:6px;
      cursor:pointer;
      font-weight:bold;
    }

    .vote{
      background:url("button.png") center center / contain no-repeat;
      color:transparent;
      width:145px;
      height:78px;
      padding:0;
      font-size:0;
      line-height:0;
      flex:0 0 auto;
      filter:brightness(1.15) contrast(1.12) saturate(1.05);
    }
    .finish{background:#10b981;color:white}
    .exclude{background:#ef4444;color:white}
    .delete{background:#991b1b;color:white}
    .reset{background:#f59e0b;color:black}
    .logout{background:#6b7280;color:white}
    .login{background:#2563eb;color:white}
    .signup{background:#10b981;color:white}

    .finished{color:#00ff9c}
    .excluded{color:#ff5555}
    .todo{color:#4da6ff}

    .game{
      background:rgba(22, 22, 22, 0.88);
      padding:12px;
      margin:10px auto;
      max-width:700px;
      border-radius:8px;
      backdrop-filter:blur(4px);
    }

    .row{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .small{
      font-size:14px;
      opacity:0.9;
    }

    .searchPanel{
      background:rgba(22, 22, 22, 0.88);
      padding:10px;
      border-radius:10px;
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
      backdrop-filter:blur(4px);
    }

    .searchPanel input{
      margin:0;
    }

    .search{
      background:#22c55e;
      color:black;
    }

    .game.match{
      outline:2px solid #22c55e;
      box-shadow:0 0 0 4px rgba(34, 197, 94, 0.2);
    }

    @media (max-width: 700px) {
      body{
        padding-top:140px;
      }

      .topBar{
        left:16px;
        right:16px;
      }

      .searchPanel{
        width:100%;
        justify-content:center;
      }

      .searchPanel input{
        width:100%;
        max-width:none;
      }
    }

    #message{
      margin:10px 0 20px 0;
      min-height:20px;
    }
  </style>
</head>
<body>

  <h1>SNES Challenge Tracker</h1>

  <div class="topBar">
    <div class="searchPanel">
      <input type="text" id="searchInput" placeholder="Search games" />
      <button class="search" id="searchBtn">Search</button>
    </div>
  </div>

  <div class="panel" id="authPanel">
    <div class="row">
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
    </div>
    <div class="row">
      <button class="signup" id="signupBtn">Sign up</button>
      <button class="login" id="loginBtn">Log in</button>
      <button class="logout" id="logoutBtn" style="display:none;">Log out</button>
    </div>
    <div class="small" id="userInfo">Not logged in</div>
  </div>

  <div id="adminPanel" class="panel" style="display:none;">
    <h3>Admin Panel</h3>
    <button class="reset" id="resetVotesBtn">Reset All Votes</button>
  </div>

  <div id="message"></div>
  <div id="games"></div>

  <script>
    const SUPABASE_URL = "https://zucfkzsezszqpqgxfxcy.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_dDwuIpaYEaFgpQW_7Klg6g_VLumikbg";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const signupBtn = document.getElementById("signupBtn");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const searchInput = document.getElementById("searchInput");
    const searchBtn = document.getElementById("searchBtn");
    const userInfo = document.getElementById("userInfo");
    const adminPanel = document.getElementById("adminPanel");
    const resetVotesBtn = document.getElementById("resetVotesBtn");
    const gamesContainer = document.getElementById("games");
    const messageEl = document.getElementById("message");

    let currentUser = null;
    let isAdmin = false;
    let lastSearchTerm = "";
    let lastSearchIndex = -1;
    let realtimeChannel = null;

    function showMessage(text, color = "white") {
      messageEl.textContent = text;
      messageEl.style.color = color;
    }

    function statusClass(status) {
      if (status === "finished") return "finished";
      if (status === "excluded") return "excluded";
      return "todo";
    }

    function clearSearchMatch() {
      document.querySelectorAll(".game.match").forEach((gameCard) => {
        gameCard.classList.remove("match");
      });
    }

    function searchGame() {
      const term = searchInput.value.trim().toLowerCase();

      clearSearchMatch();

      if (!term) {
        lastSearchTerm = "";
        lastSearchIndex = -1;
        showMessage("Type a game name to search", "yellow");
        return;
      }

      const matches = Array.from(document.querySelectorAll(".game")).filter((card) => {
        return (card.dataset.gameName || "").includes(term);
      });

      if (matches.length === 0) {
        lastSearchTerm = term;
        lastSearchIndex = -1;
        showMessage("Game not found", "red");
        return;
      }

      if (term !== lastSearchTerm) {
        lastSearchTerm = term;
        lastSearchIndex = 0;
      } else {
        lastSearchIndex = (lastSearchIndex + 1) % matches.length;
      }

      const match = matches[lastSearchIndex];
      match.classList.add("match");
      match.scrollIntoView({ behavior: "smooth", block: "center" });
      showMessage(`Jumped to ${match.dataset.displayName} (${lastSearchIndex + 1}/${matches.length})`, "lime");
    }

    async function signUp() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      const { data, error } = await supabaseClient.auth.signUp({
        email,
        password
      });

      if (error) {
        showMessage(error.message, "red");
        return;
      }

      if (data.session) {
        showMessage("Account created and logged in", "lime");
      } else {
        showMessage("Check your email to confirm your account", "yellow");
      }

      await refreshSessionAndRender();
    }

    async function logIn() {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showMessage(error.message, "red");
        return;
      }

      showMessage("Logged in", "lime");
      await refreshSessionAndRender();
    }

    async function logOut() {
      const { error } = await supabaseClient.auth.signOut();

      if (error) {
        showMessage(error.message, "red");
        return;
      }

      showMessage("Logged out", "orange");
      await refreshSessionAndRender();
    }

    async function fetchAdminStatus() {
      if (!currentUser) {
        isAdmin = false;
        adminPanel.style.display = "none";
        return;
      }

      const { data, error } = await supabaseClient.rpc("is_admin");

      if (error) {
        isAdmin = false;
        adminPanel.style.display = "none";
        return;
      }

      isAdmin = !!data;
      adminPanel.style.display = isAdmin ? "block" : "none";
    }

    async function fetchGames() {
      const { data, error } = await supabaseClient.rpc("get_games_with_votes");

      if (error) {
        showMessage(error.message, "red");
        return [];
      }

      return data || [];
    }

    async function toggleVote(gameId) {
      if (!currentUser) {
        showMessage("Login first", "red");
        return;
      }

      const { data, error } = await supabaseClient.rpc("toggle_vote", {
        p_game_id: Number(gameId)
      });

      if (error) {
        showMessage(error.message, "red");
        return;
      }

      if (data === "voted") {
        showMessage("Vote placed", "lime");
      } else if (data === "unvoted") {
        showMessage("Vote removed", "orange");
      } else if (data === "already_voted_other") {
        showMessage("You already voted on another game. Unvote that first.", "red");
      } else {
        showMessage("Vote updated", "lime");
      }

      await renderGames();
    }

    async function setGameStatus(gameId, status) {
      if (!isAdmin) return;

      const { error } = await supabaseClient.rpc("set_game_status", {
        p_game_id: Number(gameId),
        p_status: status
      });

      if (error) {
        showMessage(error.message, "red");
        return;
      }

      await renderGames();
    }

    async function resetAllVotes() {
      if (!isAdmin) return;

      const { error } = await supabaseClient.rpc("reset_all_votes");

      if (error) {
        showMessage(error.message, "red");
        return;
      }

      showMessage("All votes reset", "orange");
      await renderGames();
    }

    async function deleteGame(gameId, gameName) {
      if (!isAdmin) return;

      const confirmed = window.confirm(`Delete "${gameName}"? This cannot be undone.`);
      if (!confirmed) return;

      const { error } = await supabaseClient.rpc("delete_game", {
        p_game_id: Number(gameId)
      });

      if (error) {
        showMessage(error.message, "red");
        return;
      }

      showMessage(`Deleted ${gameName}`, "orange");
      await renderGames();
    }

    async function renderGames() {
      const games = await fetchGames();
      gamesContainer.innerHTML = "";

      games.forEach((game) => {
        const div = document.createElement("div");
        div.className = "game";
        div.dataset.gameName = game.name.toLowerCase();
        div.dataset.displayName = game.name;

        const row = document.createElement("div");
        row.className = "row";

        const nameEl = document.createElement("strong");
        nameEl.textContent = game.name;
        row.appendChild(nameEl);

        const statusEl = document.createElement("span");
        statusEl.className = statusClass(game.status);
        statusEl.textContent = game.status;
        row.appendChild(statusEl);

        const votesEl = document.createElement("span");
        votesEl.textContent = `Votes: ${game.vote_count}`;
        row.appendChild(votesEl);

        const voteBtn = document.createElement("button");
        voteBtn.className = "vote";
        voteBtn.dataset.vote = String(game.id);
        voteBtn.setAttribute("aria-label", game.user_voted ? "Unvote" : "Vote");
        voteBtn.title = game.user_voted ? "Unvote" : "Vote";
        voteBtn.textContent = game.user_voted ? "Unvote" : "Vote";
        row.appendChild(voteBtn);

        if (isAdmin) {
          const finishBtn = document.createElement("button");
          finishBtn.className = "finish";
          finishBtn.dataset.finish = String(game.id);
          finishBtn.textContent = "Finished";
          row.appendChild(finishBtn);

          const excludeBtn = document.createElement("button");
          excludeBtn.className = "exclude";
          excludeBtn.dataset.exclude = String(game.id);
          excludeBtn.textContent = "Exclude";
          row.appendChild(excludeBtn);

          const todoBtn = document.createElement("button");
          todoBtn.className = "reset";
          todoBtn.dataset.todo = String(game.id);
          todoBtn.textContent = "Todo";
          row.appendChild(todoBtn);

          const deleteBtn = document.createElement("button");
          deleteBtn.className = "delete";
          deleteBtn.dataset.delete = String(game.id);
          deleteBtn.dataset.name = game.name;
          deleteBtn.textContent = "Delete";
          row.appendChild(deleteBtn);
        }

        div.appendChild(row);

        gamesContainer.appendChild(div);
      });

      document.querySelectorAll("[data-vote]").forEach((btn) => {
        btn.onclick = () => toggleVote(btn.dataset.vote);
      });

      document.querySelectorAll("[data-finish]").forEach((btn) => {
        btn.onclick = () => setGameStatus(btn.dataset.finish, "finished");
      });

      document.querySelectorAll("[data-exclude]").forEach((btn) => {
        btn.onclick = () => setGameStatus(btn.dataset.exclude, "excluded");
      });

      document.querySelectorAll("[data-todo]").forEach((btn) => {
        btn.onclick = () => setGameStatus(btn.dataset.todo, "todo");
      });

      document.querySelectorAll("[data-delete]").forEach((btn) => {
        btn.onclick = () => deleteGame(btn.dataset.delete, btn.dataset.name);
      });
    }

    function subscribeToRealtime() {
      if (realtimeChannel) return;

      realtimeChannel = supabaseClient
        .channel("public-live-updates")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "games" },
          () => {
            renderGames();
          }
        )
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "votes" },
          () => {
            renderGames();
          }
        )
        .subscribe();
    }

    async function refreshSessionAndRender() {
      const { data } = await supabaseClient.auth.getSession();
      currentUser = data?.session?.user || null;

      if (currentUser) {
        userInfo.textContent = "Logged in as " + currentUser.email;
        logoutBtn.style.display = "inline-block";
      } else {
        userInfo.textContent = "Not logged in";
        logoutBtn.style.display = "none";
      }

      await fetchAdminStatus();
      await renderGames();
    }

    signupBtn.onclick = signUp;
    loginBtn.onclick = logIn;
    logoutBtn.onclick = logOut;
    searchBtn.onclick = searchGame;
    resetVotesBtn.onclick = resetAllVotes;

    searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        searchGame();
      }
    });

    supabaseClient.auth.onAuthStateChange(() => {
      refreshSessionAndRender();
    });

    subscribeToRealtime();
    refreshSessionAndRender();
  </script>
</body>
</html>
