<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SNES Challenge Tracker</title>

<style>
body{
  background:#0b0b0b;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}

.game{
  background:#161616;
  padding:12px;
  margin:10px auto;
  max-width:600px;
  border-radius:8px;
}

button{
  padding:6px 10px;
  margin-left:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.vote{background:#3b82f6;color:white}
</style>
</head>

<body>

<h1>SNES Challenge Tracker</h1>

<div id="games"></div>

<script>
const games = [
"Chrono Trigger",
"Super Metroid",
"Terranigma",
"Secret of Mana",
"ActRaiser"
];

const container = document.getElementById("games");

games.forEach(game=>{
  const div=document.createElement("div");
  div.className="game";
  div.innerHTML=`${game} <button class="vote">Vote</button>`;
  container.appendChild(div);
});
</script>

</body>
</html>
