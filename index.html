<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SNES Challenge Tracker</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

button{
padding:8px 12px;
margin:4px;
border:none;
border-radius:6px;
cursor:pointer;
}

.vote{background:#3b82f6;color:white}
.finish{background:#10b981;color:white}
.exclude{background:#ef4444;color:white}
.reset{background:#f59e0b;color:black}

.finished{color:#00ff9c}
.excluded{color:#ff5555}
.todo{color:#4da6ff}

.game{
background:#161616;
padding:10px;
margin:10px auto;
max-width:600px;
border-radius:8px;
}

</style>

</head>

<body>

<h1>SNES Challenge Tracker</h1>

<button class="reset" onclick="resetVotes()">Reset Votes</button>
<button onclick="adminLogin()">Admin Login</button>

<div id="games"></div>

<script>

let admin=false
const password="mike123"

let games=[
{name:"Chrono Trigger",status:"todo",votes:0},
{name:"Super Metroid",status:"todo",votes:0},
{name:"Terranigma",status:"todo",votes:0},
{name:"Secret of Mana",status:"todo",votes:0},
{name:"ActRaiser",status:"todo",votes:0}
]

function adminLogin(){

let p=prompt("Admin password")

if(p===password){
admin=true
draw()
alert("Admin mode enabled")
}

}

function draw(){

let html=""

games.forEach((g,i)=>{

let buttons=`<button class="vote" onclick="vote(${i})">Vote</button>`

if(admin){

buttons+=`
<button class="finish" onclick="finish(${i})">Finished</button>
<button class="exclude" onclick="exclude(${i})">Exclude</button>
<button onclick="todo(${i})">To Play</button>
`

}

html+=`
<div class="game">
<div class="${g.status}"><b>${g.name}</b></div>
<div>Votes: ${g.votes}</div>
${buttons}
</div>
`

})

document.getElementById("games").innerHTML=html

}

function vote(i){
games[i].votes++
draw()
}

function finish(i){
games[i].status="finished"
draw()
}

function exclude(i){
games[i].status="excluded"
draw()
}

function todo(i){
games[i].status="todo"
draw()
}

function resetVotes(){
games.forEach(g=>g.votes=0)
draw()
}

draw()

</script>

</body>
</html>
